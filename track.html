<!DOCTYPE html>
<html>
<head>
<title>Track Order</title>

<style>

body{
font-family:Arial;
background:#2c5364;
color:white;
}

.box{
width:400px;
margin:auto;
margin-top:150px;
background:white;
color:black;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#2c5364;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Track Order</h2>

<input id="ref" placeholder="Enter Reference Number">

<button onclick="track()">Track</button>

<div id="result"></div>

</div>

<script>

function track(){

let ref=document.getElementById("ref").value

let data=localStorage.getItem(ref)

if(data){

let order=JSON.parse(data)

document.getElementById("result").innerHTML=

"Customer: "+order.name+"<br>"+
"Order: "+order.order+"<br>"+
"Status: "+order.status

}
else{

document.getElementById("result").innerHTML="Order Not Found"

}

}

</script>

</body>
</html>
